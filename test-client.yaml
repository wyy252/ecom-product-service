apiVersion: v1
kind: Pod
metadata:
  name: test-client
  namespace: dev
spec:
  restartPolicy: Never
  containers:
    - name: test-client
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"